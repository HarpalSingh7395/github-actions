name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "latest"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./backend
        run: pnpm install

      - name: Test
        working-directory: ./backend
        run: pnpm test

      - name: Build
        working-directory: ./backend
        run: pnpm build

      - name: Upload build artifact
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.run_number }}
          path: backend/dist/
          retention-days: 7

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "❌ RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New secret"
            exit 1
          fi

      - name: Trigger Render Deploy Hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy triggered successfully"
