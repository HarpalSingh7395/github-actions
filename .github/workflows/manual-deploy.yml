name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - frontend
          - backend
          - both
        default: "both"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production
          - staging
        default: "production"
      skip-health-check:
        description: "Skip health check after backend deploy"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: inputs.target == 'frontend' || inputs.target == 'both'
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "latest"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install & Build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm install && pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: inputs.target == 'backend' || inputs.target == 'both'
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy triggered for environment: ${{ inputs.environment }}"

      - name: Wait for Render to start
        run: sleep 180

      - name: Health check
        if: inputs.skip-health-check == false
        uses: ./.github/actions/check-api-health
        with:
          api-url: ${{ secrets.RENDER_API_URL }}
          retries: "5"
